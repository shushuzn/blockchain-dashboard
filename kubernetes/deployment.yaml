apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-dashboard-backend
  labels:
    app: blockchain-dashboard
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blockchain-dashboard
      component: backend
  template:
    metadata:
      labels:
        app: blockchain-dashboard
        component: backend
    spec:
      containers:
        - name: backend
          image: blockchain-dashboard-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: blockchain-dashboard-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blockchain-dashboard-secrets
                  key: jwt-secret
            - name: REDIS_URL
              value: "redis://redis-service:6379"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain-dashboard-backend
spec:
  selector:
    app: blockchain-dashboard
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blockchain-dashboard-config
data:
  NODE_ENV: production
  LOG_LEVEL: info
  CACHE_TTL: "300"
---
apiVersion: v1
kind: Secret
metadata:
  name: blockchain-dashboard-secrets
type: Opaque
stringData:
  database-url: "sqlite:///data/database.db"
  jwt-secret: "CHANGE_ME_IN_PRODUCTION"
  encryption-key: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blockchain-dashboard-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - dashboard.example.com
      secretName: blockchain-dashboard-tls
  rules:
    - host: dashboard.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: blockchain-dashboard-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blockchain-dashboard-frontend
                port:
                  number: 80
