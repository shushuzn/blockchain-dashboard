name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  NODE_VERSION: 18
  DOCKER_IMAGE: blockchain-dashboard

jobs:
  # 安全扫描
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package.json
            src/webapp/package.json
      
      - name: Audit backend dependencies
        run: npm audit --production --audit-level=high
        working-directory: ./backend
        continue-on-error: true
      
      - name: Audit frontend dependencies
        run: npm audit --production --audit-level=high
        working-directory: ./src/webapp
        continue-on-error: true

  # 前端构建和测试
  build-frontend:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/webapp/package.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./src/webapp
      
      - name: Type check
        run: npm run typecheck
        working-directory: ./src/webapp
        continue-on-error: true
      
      - name: Run unit tests
        run: npm run test -- --run
        working-directory: ./src/webapp
      
      - name: Build frontend
        run: npm run build
        working-directory: ./src/webapp
        env:
          VITE_API_URL: /api
      
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./src/webapp/dist
          retention-days: 5
  
  # 后端测试
  test-backend:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./backend
      
      - name: Run linting
        run: npm run lint
        working-directory: ./backend
        continue-on-error: true
      
      - name: Run tests
        run: npm run test
        working-directory: ./backend
        env:
          NODE_ENV: test
          DATABASE_URL: sqlite::memory:
      
      - name: Run migration check
        run: node migrate.js list
        working-directory: ./backend
        continue-on-error: true

  # E2E测试
  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/webapp/package.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./src/webapp
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./src/webapp
      
      - name: Build frontend
        run: npm run build
        working-directory: ./src/webapp
      
      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: ./src/webapp
        env:
          BASE_URL: http://localhost:5173
        continue-on-error: true

  # 生产部署（仅main分支）
  deploy-production:
    needs: [build-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./dist
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        if: secrets.DOCKERHUB_USERNAME != ''
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        if: secrets.DOCKERHUB_USERNAME != ''

  # 暂存环境部署（可选）
  deploy-staging:
    needs: [build-frontend, test-backend, e2e-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy to staging
        run: echo "Deploying to staging environment"
        env:
          DEPLOY_URL: ${{ secrets.STAGING_URL }}
          DEPLOY_TOKEN: ${{ secrets.STAGING_TOKEN }}
        if: secrets.STAGING_URL != ''
